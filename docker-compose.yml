services:
  user-db:
    image: postgres:16
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=4
      - -c
      - max_replication_slots=4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-db-init:
    image: postgres:16
    depends_on:
      user-db:
        condition: service_healthy
    volumes:
      - ./db/user-init.sql:/init.sql
    entrypoint:
      - /bin/sh
      - -c
      - PGPASSWORD=postgres psql -h user-db -U postgres -d users -f /init.sql

  order-db:
    image: cockroachdb/cockroach:v23.1.10
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - ./data/cockroach-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?type=ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-db-init:
    image: cockroachdb/cockroach:v23.1.10
    depends_on:
      order-db:
        condition: service_healthy
    volumes:
      - ./db/order-init.sql:/init.sql
    entrypoint:
      - /bin/bash
      - -c
      - cockroach sql --insecure --host=order-db -d defaultdb -f /init.sql

  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka-init:
    image: apache/kafka:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Creating Kafka topics..."
        kafka-topics.sh --create --if-not-exists --topic user-db-cdc --partitions 3 --replication-factor 1 --bootstrap-server kafka:9093
        kafka-topics.sh --create --if-not-exists --topic email-job --partitions 3 --replication-factor 1 --bootstrap-server kafka:9093
        kafka-topics.sh --create --if-not-exists --topic failed-dlq --partitions 3 --replication-factor 1 --bootstrap-server kafka:9093
        kafka-topics.sh --bootstrap-server kafka:9093 --list

  debezium-connect:
    image: debezium/connect:2.7
    depends_on:
      kafka:
        condition: service_healthy
      user-db:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9093
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      ENABLE_DEBEZIUM_SCRIPTING: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 10

  debezium-init:
    image: curlimages/curl:8.8.0
    depends_on:
      debezium-connect:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./db/user-connector.json:/connector.json
    entrypoint:
      - /bin/sh
      - -c
      - |
        curl -sS -X POST http://debezium-connect:8083/connectors \
          -H "Content-Type: application/json" \
          --data @/connector.json || true

  user-service:
    build: ./microservices/user-service
    depends_on:
      user-db:
        condition: service_healthy
      user-db-init:
        condition: service_completed_successfully
    environment:
      DB_URL: postgresql://postgres:postgres@user-db:5432/users
    ports:
      - "8001:80"

  order-service:
    build: ./microservices/order-service
    depends_on:
      order-db:
        condition: service_healthy
      order-db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      DB_URL: postgresql://root@order-db:26257/defaultdb?sslmode=disable
      KAFKA_BROKERS: kafka:9093
      EMAIL_JOB_TOPIC: email-job
      USER_CDC_TOPIC: user-db-cdc
      CDC_CONSUMER_GROUP: order-user-sync
    ports:
      - "8002:80"

  worker-service:
    build: ./microservices/worker-service
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:9093
      KAFKA_TOPIC: email-job
      KAFKA_DLQ_TOPIC: failed-dlq
      KAFKA_CONSUMER_GROUP: worker-service
