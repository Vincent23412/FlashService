apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: flashservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: flashservice/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: DB_URL
              value: "postgresql://postgres:postgres@user-db.flashservice.svc.cluster.local:5432/users"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: flashservice
spec:
  selector:
    app: user-service
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
