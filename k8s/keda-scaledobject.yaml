apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-service-scaler
  namespace: flashservice
spec:
  scaleTargetRef:
    name: worker-service
    kind: Deployment
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.flashservice.svc.cluster.local:9093
        consumerGroup: worker-service
        topic: email-job
        lagThreshold: "5"
        activationLagThreshold: "3"
        offsetResetPolicy: earliest
