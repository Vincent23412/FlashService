apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: flashservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
        - name: order-db
          image: cockroachdb/cockroach:v23.1.10
          args:
            - start-single-node
            - --insecure
          ports:
            - containerPort: 26257
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health?type=ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: flashservice
spec:
  selector:
    app: order-db
  ports:
    - name: sql
      port: 26257
      targetPort: 26257
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
