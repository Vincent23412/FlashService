apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: flashservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: flashservice/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: DB_URL
              value: "postgresql://root@order-db.flashservice.svc.cluster.local:26257/defaultdb?sslmode=disable"
            - name: KAFKA_BROKERS
              value: "kafka.flashservice.svc.cluster.local:9093"
            - name: EMAIL_JOB_TOPIC
              value: "email-job"
            - name: USER_CDC_TOPIC
              value: "user-db-cdc"
            - name: CDC_CONSUMER_GROUP
              value: "order-user-sync"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: flashservice
spec:
  selector:
    app: order-service
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
