apiVersion: batch/v1
kind: Job
metadata:
  name: order-db-init
  namespace: flashservice
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: order-db-init
          image: cockroachdb/cockroach:v23.1.10
          command:
            - /bin/bash
            - -c
            - |
              cat <<'SQL' >/tmp/init.sql
              CREATE TABLE IF NOT EXISTS products (
                  product_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  name VARCHAR(100) NOT NULL,
                  description TEXT,
                  price DECIMAL(10, 2) NOT NULL,
                  created_at TIMESTAMP DEFAULT now()
              );
              CREATE TABLE IF NOT EXISTS inventory (
                  product_id UUID PRIMARY KEY REFERENCES products(product_id),
                  stock INT NOT NULL CHECK (stock >= 0),
                  updated_at TIMESTAMP DEFAULT now()
              );
              CREATE TABLE IF NOT EXISTS orders (
                  order_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  user_id UUID NOT NULL,
                  status VARCHAR(20) NOT NULL DEFAULT 'PENDING',
                  created_at TIMESTAMP DEFAULT now()
              );
              CREATE TABLE IF NOT EXISTS order_items (
                  order_item_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  order_id UUID NOT NULL REFERENCES orders(order_id) ON DELETE CASCADE,
                  product_id UUID NOT NULL,
                  quantity INT NOT NULL CHECK (quantity > 0),
                  price_at_purchase DECIMAL(10, 2) NOT NULL,
                  created_at TIMESTAMP DEFAULT now()
              );
              CREATE TABLE IF NOT EXISTS user_snapshot (
                  user_id UUID PRIMARY KEY,
                  username VARCHAR(50) NOT NULL,
                  email VARCHAR(100) NOT NULL,
                  source_updated_at TIMESTAMP,
                  synced_at TIMESTAMP DEFAULT now()
              );
              SQL
              cockroach sql --insecure --host=order-db.flashservice.svc.cluster.local -d defaultdb -f /tmp/init.sql
  backoffLimit: 5
